spring.application.name=ordermanager-execution
spring.config.import=optional:file:../.env[.properties]

# No HTTP server — pure Kafka-driven engine
spring.main.web-application-type=none

# Kafka
spring.kafka.properties.sasl.mechanism=PLAIN
spring.kafka.bootstrap-servers=pkc-56d1g.eastus.azure.confluent.cloud:9092
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFKA_CLUSTER_API_KEY}" password="${KAFKA_CLUSTER_API_SECRET}";
spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.properties.client.dns.lookup=use_all_dns_ips
spring.kafka.properties.session.timeout.ms=45000

spring.kafka.consumer.group-id=executionservice
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3

app.kafka.topic.order-created=order.created
app.kafka.topic.execution-report=execution.report

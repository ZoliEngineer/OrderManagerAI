server.port=8083
spring.application.name=ordermanager-risk
spring.config.import=optional:file:../.env[.properties]

# gRPC (wired in step 3 when grpc-server-spring-boot-starter is added)
grpc.server.port=9090
grpc.server.security.enabled=false

# Redis (buying-power cache only)
spring.data.redis.host=redis-12098.c282.east-us-mz.azure.cloud.redislabs.com
spring.data.redis.port=12098
spring.data.redis.password=${REDIS_PASSWORD}
app.cache.buying-power.key-prefix=account:buying-power:

# Kafka (market price feed)
spring.kafka.properties.sasl.mechanism=PLAIN
spring.kafka.bootstrap-servers=pkc-56d1g.eastus.azure.confluent.cloud:9092
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFKA_CLUSTER_API_KEY}" password="${KAFKA_CLUSTER_API_SECRET}";
spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.client-id=ccloud-springboot-client-aab84004-0f56-4571-95a1-919ca23f9601
spring.kafka.properties.client.dns.lookup=use_all_dns_ips
spring.kafka.properties.session.timeout.ms=45000
spring.kafka.consumer.group-id=riskservice-price-cache
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=latest
app.kafka.topic.marketdata=marketdata_stream

# Entra ID
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://login.microsoftonline.com/${AAD_TENANT_ID}/v2.0
spring.security.oauth2.resourceserver.jwt.audiences=${AAD_CLIENT_ID}

management.endpoints.web.exposure.include=health

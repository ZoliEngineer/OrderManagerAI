server.port=8080

# Load .env from repo root for local dev (no-op in production where env vars come from Key Vault)
spring.config.import=optional:file:../.env[.properties]

# Finnhub WebSocket price feed.
# Set env var FINNHUB_API_KEY to enable live prices; RandomPriceSimulator is used when unset.
# Spring Boot relaxed binding maps FINNHUB_API_KEY -> finnhub.api-key automatically.
finnhub.rest-base-url=https://finnhub.io/api/v1
finnhub.ws-url=wss://ws.finnhub.io

# Entra ID — issuer-uri causes Spring to auto-fetch the public keys for JWT validation
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://login.microsoftonline.com/${AAD_TENANT_ID}/v2.0
spring.security.oauth2.resourceserver.jwt.audiences=${AAD_CLIENT_ID}
# Comma-separated list — override in production via env var CORS_ALLOWED_ORIGINS
cors.allowed-origins=http://localhost:3000
spring.application.name=ordermanager-backend
management.endpoints.web.exposure.include=health




#Redis
spring.data.redis.host=redis-12098.c282.east-us-mz.azure.cloud.redislabs.com
spring.data.redis.port=12098
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=false
app.redis.channel.market-prices=market.prices

#Kafka
# Required connection configs for Kafka producer, consumer, and admin
spring.kafka.properties.sasl.mechanism=PLAIN
spring.kafka.bootstrap-servers=pkc-56d1g.eastus.azure.confluent.cloud:9092
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFKA_CLUSTER_API_KEY}" password="${KAFKA_CLUSTER_API_SECRET}";
spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.client-id=ccloud-springboot-client-aab84004-0f56-4571-95a1-919ca23f9601

# Best practice for higher availability in Apache Kafka clients prior to 3.0
spring.kafka.properties.session.timeout.ms=45000
app.kafka.topic.marketdata=marketdata_stream

# Producer configuration
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=1

# Consumer configuration
spring.kafka.consumer.group-id=my-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest

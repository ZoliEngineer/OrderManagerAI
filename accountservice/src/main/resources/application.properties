server.port=8081

spring.config.import=optional:file:../.env[.properties]

spring.application.name=ordermanager-account

# Flyway owns schema; Hibernate only validates
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway — enabled only when FLYWAY_ENABLED=true (local dev only)
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.locations=classpath:db/migration
spring.flyway.user=neondb_owner
spring.flyway.password=${NEON_OWNER_PASSWORD}


# PostgreSQL (Neon serverless)
spring.datasource.url=jdbc:postgresql://ep-purple-forest-am0xhi3u-pooler.c-5.us-east-1.aws.neon.tech/ordermanagerdb?sslmode=require&channel_binding=require
spring.datasource.username=ordermanager_db_user
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Redis — same instance as marketdata
spring.data.redis.host=redis-12098.c282.east-us-mz.azure.cloud.redislabs.com
spring.data.redis.port=12098
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=false

# Entra ID — same tenant and client as marketdata
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://login.microsoftonline.com/${AAD_TENANT_ID}/v2.0
spring.security.oauth2.resourceserver.jwt.audiences=${AAD_CLIENT_ID}

cors.allowed-origins=http://localhost:3000

management.endpoints.web.exposure.include=health

name: CI — Build & Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  paths-filter:
    runs-on: ubuntu-latest
    outputs:
      marketdata: ${{ steps.filter.outputs.marketdata }}
      accountservice: ${{ steps.filter.outputs.accountservice }}
      orderservice: ${{ steps.filter.outputs.orderservice }}
      riskservice: ${{ steps.filter.outputs.riskservice }}
      frontend: ${{ steps.filter.outputs.frontend }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            marketdata:
              - 'marketdata/**'
            accountservice:
              - 'accountservice/**'
            orderservice:
              - 'orderservice/**'
            riskservice:
              - 'riskservice/**'
              - 'proto/**'
            frontend:
              - 'frontend/**'
            shared:
              - 'pom.xml'
              - '.github/workflows/**'

  backend-test:
    needs: paths-filter
    if: needs.paths-filter.outputs.marketdata == 'true' || needs.paths-filter.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        id: setup-java
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run backend tests
        run: cd marketdata && mvn clean verify -B
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.path }}

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Backend Tests
          path: marketdata/target/surefire-reports/*.xml
          reporter: java-junit

  accountservice-test:
    needs: paths-filter
    if: needs.paths-filter.outputs.accountservice == 'true' || needs.paths-filter.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        id: setup-java
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run account service tests
        run: cd accountservice && mvn clean verify -B
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.path }}

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Account Service Tests
          path: accountservice/target/surefire-reports/*.xml
          reporter: java-junit

  orderservice-test:
    needs: paths-filter
    if: needs.paths-filter.outputs.orderservice == 'true' || needs.paths-filter.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        id: setup-java
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run order service tests
        run: cd orderservice && mvn clean verify -B
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.path }}

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Order Service Tests
          path: orderservice/target/surefire-reports/*.xml
          reporter: java-junit

  riskservice-test:
    needs: paths-filter
    if: needs.paths-filter.outputs.riskservice == 'true' || needs.paths-filter.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        id: setup-java
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run risk service tests
        run: cd riskservice && mvn clean verify -B
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.path }}

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Risk Service Tests
          path: riskservice/target/surefire-reports/*.xml
          reporter: java-junit

  frontend-test:
    needs: paths-filter
    if: needs.paths-filter.outputs.frontend == 'true' || needs.paths-filter.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install and test
        run: |
          cd frontend
          npm ci
          npm test

name: Deploy to Azure

on:
  workflow_run:
    workflows: ["CI — Build & Test"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  paths-filter:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      marketdata: ${{ steps.filter.outputs.marketdata }}
      accountservice: ${{ steps.filter.outputs.accountservice }}
      frontend: ${{ steps.filter.outputs.frontend }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            marketdata:
              - 'marketdata/**'
            accountservice:
              - 'accountservice/**'
            frontend:
              - 'frontend/**'
            shared:
              - 'pom.xml'
              - '.github/workflows/**'

  build-and-deploy:
    needs: paths-filter
    runs-on: ubuntu-latest
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
      RG: ordermanagerai-prod-rg
      DEPLOY_MARKETDATA: ${{ needs.paths-filter.outputs.marketdata == 'true' || needs.paths-filter.outputs.shared == 'true' }}
      DEPLOY_ACCOUNTSERVICE: ${{ needs.paths-filter.outputs.accountservice == 'true' || needs.paths-filter.outputs.shared == 'true' }}
      DEPLOY_FRONTEND: ${{ needs.paths-filter.outputs.frontend == 'true' || needs.paths-filter.outputs.shared == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        if: env.DEPLOY_MARKETDATA == 'true' || env.DEPLOY_ACCOUNTSERVICE == 'true'
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - uses: actions/setup-node@v4
        if: env.DEPLOY_FRONTEND == 'true'
        with:
          node-version: '20'

      # Build artifacts
      - name: Build backend JAR
        if: env.DEPLOY_MARKETDATA == 'true'
        run: cd marketdata && mvn clean package -DskipTests -B

      - name: Build account service JAR
        if: env.DEPLOY_ACCOUNTSERVICE == 'true'
        run: cd accountservice && mvn clean package -DskipTests -B

      - name: Build frontend
        if: env.DEPLOY_FRONTEND == 'true'
        run: cd frontend && npm ci && npm run build

      # Login to Azure early so we can query the backend FQDN before
      # building the frontend Docker image (URL is baked in at build time).
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get backend FQDN
        if: env.DEPLOY_MARKETDATA == 'true' || env.DEPLOY_FRONTEND == 'true'
        run: |
          FQDN=$(az containerapp show \
            --name ordermanagerai-prod-marketdata \
            --resource-group "$RG" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "BACKEND_FQDN=$FQDN" >> $GITHUB_ENV

      - name: Get account service FQDN
        if: env.DEPLOY_FRONTEND == 'true' || env.DEPLOY_ACCOUNTSERVICE == 'true'
        run: |
          FQDN=$(az containerapp show \
            --name ordermanagerai-prod-acct-svc \
            --resource-group "$RG" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "ACCOUNTSERVICE_FQDN=$FQDN" >> $GITHUB_ENV

      # Docker build & push
      - name: Login to ACR
        run: |
          echo "$ACR_PASSWORD" | docker login "$ACR_LOGIN_SERVER" \
            -u "$ACR_USERNAME" --password-stdin

      - name: Build and push marketdata image
        if: env.DEPLOY_MARKETDATA == 'true'
        run: |
          TAG="${ACR_LOGIN_SERVER}/ordermanagerai-marketdata:${{ github.sha }}"
          TAG_LATEST="${ACR_LOGIN_SERVER}/ordermanagerai-marketdata:latest"
          docker build -t "$TAG" -t "$TAG_LATEST" marketdata/
          docker push "$TAG"
          docker push "$TAG_LATEST"

      - name: Build and push account service image
        if: env.DEPLOY_ACCOUNTSERVICE == 'true'
        run: |
          TAG="${ACR_LOGIN_SERVER}/ordermanagerai-accountservice:${{ github.sha }}"
          TAG_LATEST="${ACR_LOGIN_SERVER}/ordermanagerai-accountservice:latest"
          docker build -t "$TAG" -t "$TAG_LATEST" accountservice/
          docker push "$TAG"
          docker push "$TAG_LATEST"

      # REACT_APP_API_URL and REACT_APP_WS_BASE are derived from the live
      # Container App FQDN fetched above — no hardcoded URLs needed.
      - name: Build and push frontend image
        if: env.DEPLOY_FRONTEND == 'true'
        run: |
          TAG="${ACR_LOGIN_SERVER}/ordermanagerai-frontend:${{ github.sha }}"
          TAG_LATEST="${ACR_LOGIN_SERVER}/ordermanagerai-frontend:latest"
          docker build \
            --build-arg REACT_APP_API_URL="https://${{ env.BACKEND_FQDN }}" \
            --build-arg REACT_APP_WS_BASE="wss://${{ env.BACKEND_FQDN }}" \
            --build-arg REACT_APP_ACCOUNTS_API_URL="https://${{ env.ACCOUNTSERVICE_FQDN }}" \
            --build-arg REACT_APP_AAD_CLIENT_ID="${{ vars.AAD_CLIENT_ID }}" \
            --build-arg REACT_APP_AAD_TENANT_ID="${{ vars.AAD_TENANT_ID }}" \
            --build-arg REACT_APP_AAD_SCOPE="${{ vars.AAD_SCOPE }}" \
            -t "$TAG" -t "$TAG_LATEST" frontend/
          docker push "$TAG"
          docker push "$TAG_LATEST"

      # az containerapp update replaces the running revision with the new image.
      - name: Deploy marketdata service
        if: env.DEPLOY_MARKETDATA == 'true'
        run: |
          az containerapp update \
            --name ordermanagerai-prod-marketdata \
            --resource-group "$RG" \
            --image "${ACR_LOGIN_SERVER}/ordermanagerai-marketdata:${{ github.sha }}"
          az containerapp ingress update \
            --name ordermanagerai-prod-marketdata \
            --resource-group "$RG" \
            --target-port 8080

      - name: Deploy frontend
        if: env.DEPLOY_FRONTEND == 'true'
        run: |
          az containerapp update \
            --name ordermanagerai-prod-frontend \
            --resource-group "$RG" \
            --image "${ACR_LOGIN_SERVER}/ordermanagerai-frontend:${{ github.sha }}"

      - name: Deploy account service
        if: env.DEPLOY_ACCOUNTSERVICE == 'true'
        run: |
          az containerapp update \
            --name ordermanagerai-prod-acct-svc \
            --resource-group "$RG" \
            --image "${ACR_LOGIN_SERVER}/ordermanagerai-accountservice:${{ github.sha }}"
          az containerapp ingress update \
            --name ordermanagerai-prod-acct-svc \
            --resource-group "$RG" \
            --target-port 8081

      - name: Smoke test
        if: env.DEPLOY_MARKETDATA == 'true' || env.DEPLOY_ACCOUNTSERVICE == 'true' || env.DEPLOY_FRONTEND == 'true'
        run: |
          echo "Waiting 30s for deployment to stabilize..."
          sleep 30
          FAILED=0
          if [ "$DEPLOY_MARKETDATA" = "true" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$BACKEND_FQDN/actuator/health")
            if [ "$STATUS" -ne 200 ]; then
              echo "❌ Market data service smoke test failed (HTTP $STATUS)"
              FAILED=1
            else
              echo "✅ Market data service smoke test passed"
            fi
          fi
          if [ "$DEPLOY_ACCOUNTSERVICE" = "true" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$ACCOUNTSERVICE_FQDN/actuator/health")
            if [ "$STATUS" -ne 200 ]; then
              echo "❌ Account service smoke test failed (HTTP $STATUS)"
              FAILED=1
            else
              echo "✅ Account service smoke test passed"
            fi
          fi
          exit $FAILED

server.port=8082
spring.application.name=ordermanager-order
spring.config.import=optional:file:../.env[.properties]

# PostgreSQL
spring.datasource.url=jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:6543/postgres?sslmode=require
spring.datasource.username=ordermanager_user.hojmlgojciudwfwflpoz
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.url=jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
spring.flyway.user=ordermanager_user.hojmlgojciudwfwflpoz
spring.flyway.password=${SPRING_DATASOURCE_PASSWORD}

# Redis
spring.data.redis.host=redis-12098.c282.east-us-mz.azure.cloud.redislabs.com
spring.data.redis.port=12098
spring.data.redis.password=${REDIS_PASSWORD}
app.redis.channel.market-prices=market.prices

# Kafka
spring.kafka.bootstrap-servers=pkc-56d1g.eastus.azure.confluent.cloud:9092
spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.properties.sasl.mechanism=PLAIN
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFKA_CLUSTER_API_KEY}" password="${KAFKA_CLUSTER_API_SECRET}";
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3

app.kafka.topic.order-created=order.created
app.kafka.topic.order-rejected=order.rejected
app.kafka.topic.order-filled=order.filled
app.kafka.topic.order-cancelled=order.cancelled

# Entra ID
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://login.microsoftonline.com/${AAD_TENANT_ID}/v2.0
spring.security.oauth2.resourceserver.jwt.audiences=${AAD_CLIENT_ID}

# CORS
cors.allowed-origins=http://localhost:3000

# Service-to-service
app.services.market-data-service.base-url=http://localhost:8080

# Actuator
management.endpoints.web.exposure.include=health
